name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-bge-small-en-v1.5

      - name: Sync project-memory MCP server dependencies
        working-directory: plugins/albino/mcp-servers/project-memory
        run: uv sync

      - name: Validate
        run: make validate

      - name: Check formatting
        run: |
          make format
          git diff --exit-code || (echo "make format produced changes: run 'make format' locally and commit the result." && exit 1)

      - name: Lint
        run: make lint

      - name: Test
        run: make test
